# Math engine parameters (Step 2). Tune via walk-forward backtesting later.

temperature: 7.0

tiers:
  lock_min: 0.65
  strong_min: 0.58
  lean_min: 0.52
  coin_flip_min: 0.48
  # Below coin_flip_min on the favorite -> NO_PICK

confidence_bands:
  LOCK: 0.08
  STRONG: 0.07
  LEAN: 0.05
  COIN_FLIP: 0.04
  NO_PICK: 0.03

# Category weights multiply the gap before summing into total_edge.
# Defaults come from stats.yaml; override here if needed.
category_weights: {}

# Cardio matters less in 3-round non-title fights (finishes happen before cardio).
cardio_weight_by_rounds:
  three_round: 0.75
  five_round: 1.0
