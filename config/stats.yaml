    higher_is_better: true
  kd_per_fight:
    source: derived_history
    higher_is_better: true
  sub_attempts_per_fight:
    source: derived_history
    higher_is_better: true
  reversals_per_fight:
    source: derived_history
    higher_is_better: true
  ctrl_time_per_fight_seconds:
