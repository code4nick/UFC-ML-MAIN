# Math-engine inputs only (47 stats).
# Research rules in research_rules.yaml must NOT reference these keys.

categories:
  striking:
    weight: 1.0
    stats:
      - slpm
      - str_acc
      - str_def
      - kd_per_fight
  grappling:
    weight: 1.0
    stats:
      - td_avg
      - td_acc
      - td_def
      - sub_avg
      - ctrl_time_per_fight_seconds
      - reversals_per_fight
  recent_form:
    weight: 1.0
    stats:
      - last_5_win_rate
      - opponent_avg_win_rate_in_wins
  style_matchup:
    weight: 1.0
    stats:
      - first_round_finish_rate
      - ko_tko_win_rate
      - submission_win_rate
  physical_edge:
    weight: 0.7
    stats:
      - height_inches
      - reach_inches
      - age_years
  cardio:
    weight: 0.6
    stats:
      - pace_decay_ratio
      - grappling_pace_decay_ratio
  durability:
    weight: 1.0
    stats:
      - sig_strikes_absorbed_per_fight
      - ko_tko_loss_rate
      - sub_loss_rate
  fight_iq:
    weight: 0.7
    stats:
      - decision_fight_win_rate
  judge_fit:
    weight: 0.5
    stats:
      - decision_rate
  context_math:
    weight: 0.7
    stats:
      - win_rate
      - ufc_fight_count
      - title_fight_wins

stat_definitions:
  slpm:
    source: ufcstats_career
    description: Significant strikes landed per minute
    higher_is_better: true
  str_acc:
    source: ufcstats_career
    description: Striking accuracy (%)
    higher_is_better: true
  sapm:
    source: ufcstats_career
    description: Significant strikes absorbed per minute
    higher_is_better: false
  str_def:
    source: ufcstats_career
    description: Striking defense (%)
    higher_is_better: true
  td_avg:
    source: ufcstats_career
    description: Takedowns landed per 15 minutes
    higher_is_better: true
  td_acc:
    source: ufcstats_career
    description: Takedown accuracy (%)
    higher_is_better: true
  td_def:
    source: ufcstats_career
    description: Takedown defense (%)
    higher_is_better: true
  sub_avg:
    source: ufcstats_career
    description: Submission attempts per 15 minutes
    higher_is_better: true
  height_inches:
    source: ufcstats_profile
    higher_is_better: true
  reach_inches:
    source: ufcstats_profile
    higher_is_better: true
  weight_lbs:
    source: ufcstats_profile
    higher_is_better: null
  age_years:
    source: derived_dob
    higher_is_better: false
  wins:
    source: ufcstats_record
    higher_is_better: true
  losses:
    source: ufcstats_record
    higher_is_better: false
  draws:
    source: ufcstats_record
    higher_is_better: null
  total_fights:
    source: derived_record
    higher_is_better: true
  win_rate:
