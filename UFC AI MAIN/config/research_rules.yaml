# Research-engine context ONLY — no overlap with config/stats.yaml keys.

meta:
  max_total_prob_adjustment: 0.05

context_fields:
  - days_since_last_fight
  - months_since_last_fight
  - is_ufc_debut_on_card
  - is_title_fight
  - scheduled_rounds
  - short_notice_days
  - weight_miss_last_card
  - returning_from_injury_flag

rules:
  - id: long_layoff
    field: months_since_last_fight
    operator: gte
    value: 18
    prob_adjustment: -0.02
    bullet: "18+ month layoff — ring rust risk"
    category: watch_out

  - id: moderate_layoff
    field: months_since_last_fight
    operator: gte
    value: 12
    prob_adjustment: -0.01
    bullet: "12–17 month layoff — timing may be off"
    category: watch_out
    max_value: 17.9

  - id: ufc_debut
    field: is_ufc_debut_on_card
    operator: is_true
    value: true
    prob_adjustment: -0.02
    bullet: "UFC debut — limited octagon data"
    category: watch_out

  - id: title_fight
    field: is_title_fight
    operator: is_true
    value: true
    prob_adjustment: 0
    bullet: "5-round title fight — pace and cardio matter more"
    category: why_pick
